<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MARIO BROS SANJAYYA JOMOK FIGHT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="score-board">
            SCORE: <span id="score">0</span> | KILLS: <span id="kills">0</span>
        </div>

        <div id="start-menu">
            <h1 class="pixel-text">MARIO BROS SANJAYYA<br>JOMOK FIGHT</h1>
            <button onclick="startGame()">MULAI JOMOK</button>
        </div>

        <div id="player">
            <div class="leg leg-left"></div>
            <div class="leg leg-right"></div>
        </div>

        <div id="enemy-container"></div>

        <div id="game-over">
            <h1>WASTED</h1>
            <p>SCORE: <span id="final-score">0</span></p>
            <button onclick="location.reload()">RETRY</button>
        </div>

        <div id="controls">
            <div class="move-btns">
                <button id="btn-left">◀</button>
                <button id="btn-right">▶</button>
            </div>
            <button id="btn-jump">JUMP</button>
        </div>
    </div>

    <audio id="sndMusic" src="bg-music.mp3" loop></audio>
    <audio id="sndJump" src="jump.mp3"></audio>
    <audio id="sndKalah" src="kalah.mp3"></audio>
    <audio id="sndTembak" src="tembak.mp3"></audio>
    <audio id="sndLvl1" src="sound 1.mp3"></audio>
    <audio id="sndLvl2" src="sound 2.mp3"></audio>
    <audio id="sndLvl3" src="sound 3.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
